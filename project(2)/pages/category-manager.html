<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý - Study Tracker</title>
    <link rel="stylesheet" href="../style/category-manager.css">
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div><img src="../assets/icons/re.png" alt=""></div>
                <div class="logo-text">
                    <span class="brand">Study Tracker</span>
                    <span class="sub-brand">Quản lý tiến độ học tập</span>
                </div>
            </div>

            <div class="menu">
                <ul>
                    <li class="menu-item"><span class="icon"><img src="../assets/icons/Trending up.png"
                                alt=""></span>Thống kê</li>
                    <li class="menu-item hight"><span class="icon"><img src="../assets/icons/Notebook.png"
                                alt=""></span><a href="./category-manager.html">Quản lý môn học</a></li>
                    <li class="menu-item"><span class="icon"><img src="../assets/icons/Document duplicate.png"
                                alt=""></span><a href="./product-manager.html">Quản lý bài học</a></li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle"><img src="../assets/icons/Icon button.png" alt=""></button>
                </div>

                <div class="header-right">
                    <div class="user-box">
                        <div class="user-info">
                            <img class="name" src="../assets/icons/Icon button (1).png">
                            <img class="name" src="../assets/icons/Icon button (2).png">
                            <img class="name" src="../assets/icons/Icon button (3).png" alt="">
                        </div>
                        <div class="avatar" id="avatar">
                            <img src="../assets/images/Avatar w. photo.png" alt="">

                            <div class="logout-menu" style="display: none;" id="logoutMenu">
                                <button id="logoutBtn">Đăng xuất</button>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="content-header">
                    <h1 class="content-title">Môn học</h1>
                    <div class="content-btn">
                        <select class="content-selection" id="filter-status">
                            <option value="all">Tất cả</option>
                            <option value="active">Đang hoạt động</option>
                            <option value="inactive">Ngừng hoạt động</option>
                        </select>
                        <button class="add-content" id="btn-add-subject">Thêm mới môn học</button>
                    </div>
                </div>
            </div>

            <div class="st-search-bar">
                <input type="text" placeholder="Tìm kiếm môn học theo tên...." class="btn-find" id="search-input">
                <span class="search-icon"><img src="../assets/icons/Search.png" alt=""></span>
            </div>

            <table class="st-table">
                <thead>
                    <tr>
                        <th>Tên môn học <span><img src="../assets/icons/arrow-down.png" alt=""></span></th>
                        <th>Trạng thái</th>
                        <th>Chức năng</th>
                    </tr>
                </thead>

                <tbody id="table-body">
                    <!-- <tr class="st-table-row">
                        <td>Lập trình C</td>
                        <td><span class="st-status st-active-status">● Đang hoạt động</span></td>
                        <td class="st-actions">
                            <span class="st-icon-del"><img src="../assets/icons/Button.png" alt=""></span>
                            <span class="st-icon-edit"><img src="../assets/icons/Button (1).png" alt=""></span>
                        </td>
                    </tr> -->
                </tbody>
            </table>

            <footer>
                <div class="st-pagination">
                    <button class="st-pag-btn" id="btn-prev"><img src="../assets/icons/Type=Prev, Outlined=Yes.png" alt=""></button>
                    <div id="button-number" class="st-button-number"></div>
                    <button class="st-pag-btn" id="btn-next"><img src="../assets/icons/Type=Next, Outlined=Yes.png" alt=""></button>
                </div>
            </footer>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay"></div>

    <!-- Modal thêm -->
    <div id="modal-add" class="modal">
        <div class="modal-content" id="modal-add">
            <div class="modal-header">
                <h3>Thêm mới môn học</h3>
                <span class="close" id="closeIcon">&times;</span>
            </div>

            <div class="modal-body">
                <label>Tên môn học</label>
                <input type="text" id="nameSubject" style="margin-bottom: 10px;">
            </div>
            <span id="error-name" style="color: red;"></span>

            <div class="modal-body">
                <label>Trạng thái</label>
                <div class="radio-group" id="status">
                    <label class="radio-container">
                        <input type="radio" name="status-add" value="active" checked>
                        Đang hoạt động
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="status-add" value="inactive">
                        Ngừng hoạt động
                    </label>
                </div>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" id="closeCancel">Hủy</button>
            <button class="btn-submit" id="btnAdd">Thêm</button>
        </div>
    </div>

    <!-- Modal sửa -->
    <div id="modal-edit" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Cập nhật môn học</h3>
                <span class="close-edit" id="iconEdit">&times;</span>
            </div>

            <div class="modal-body">
                <label>Tên môn học</label>
                <input id="edit-name" type="text">
            </div>
            <span id="error-name-edit" style="color: red;"></span>

            <div class="modal-body">
                <label>Trạng thái</label>
                <div class="radio-group">
                    <label class="radio-container">
                        <input type="radio" name="status-edit" value="active" checked>
                        Đang hoạt động
                    </label>
                    <label class="radio-container">
                        <input type="radio" name="status-edit" value="inactive">
                        Ngừng hoạt động
                    </label>
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn-cancel-edit" id="btnCancelEdit">Hủy</button>
                <button class="btn-submit" id="btnSave">Lưu</button>
            </div>
        </div>
    </div>

    <!-- xóa -->
    <div id="modal-delete" class="modal">
        <div class="modal-content" style="text-align:center">
            <div class="modal-header">
                <img src="../assets/icons/Featured icon.png" alt="">
            </div>

            <div class="modal-body">
                <h3>Xác nhận</h3>
                <p>Bạn có chắc muốn xoá bài học <b id="subjectText"></b> Khỏi hệ thống
                    không
                </p>
            </div>
            <hr>
            <div class="modal-footer">
                <button class="btn-cancel-delete" id="closeCancelDelete">Hủy</button>
                <button class="btn-delete" id="btnDelete">Xoá</button>
            </div>
        </div>
    </div>

    <!-- Modal xác nhận đăng xuất -->
    <div class="modal modal-logout">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Xác nhận đăng xuất</h3>
                <span class="close-logout">&times;</span>
            </div>

            <div class="modal-body modal-logout-body">
                <p>Bạn có chắc muốn đăng xuất không?</p>
            </div>

            <div class="modal-footer modal-logout-footer">
                <button class="btn-cancel logout-cancel">Hủy</button>
                <button class="btn-delete logout-confirm">Đăng xuất</button>
            </div>
        </div>
    </div>

    <script src="../js/category-manager.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>

</html>
